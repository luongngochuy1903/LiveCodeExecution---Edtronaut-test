spring:
  application:
    name: code-execution-system

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:codeexecution}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

server:
  port: 8080

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha

# App config
app:
  execution:
    queue-key: "execution:queue"
    result-key-prefix: "execution:result:"
    timeout-seconds: 10
    memory-limit-mb: 64
    max-retries: 3
    temp-dir: ${EXECUTION_TEMP_DIR:/tmp/ces-sandbox}
  worker:
    poll-interval-ms: 500
    enabled: ${WORKER_ENABLED:true}

logging:
  level:
    com.codeexecution: DEBUG
    org.springframework.data.redis: INFO
