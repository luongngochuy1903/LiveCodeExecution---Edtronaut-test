version: "3.9"

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ces-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: codeexecution
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codeexecution"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2
    container_name: ces-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Spring Boot API ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ces-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: codeexecution
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_ENABLED: "false"   # API node does NOT run the worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Execution Worker ──────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ces-worker
    restart: unless-stopped
    # Must run as root initially so entrypoint can fix docker group GID,
    # then drops to workeruser via su-exec
    user: root
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: codeexecution
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Docker socket: lets worker call Docker daemon on the host to spin up sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared temp dir: MUST be a real host path (not named volume).
      # Worker writes source files here → bind-mounts same path into sandbox containers.
      # The path inside the container must match what sandbox `docker run -v` uses on the host.
      - /tmp/ces-sandbox:/tmp/ces-sandbox
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  postgres_data:
  redis_data:
